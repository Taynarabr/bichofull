<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px; border-radius: 15px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Bicho Full</h2>
      <p class="text-muted">Entre para começar suas apostas</p>
    </div>
    
    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" [(ngModel)]="loginData.email" class="form-control form-control-lg" placeholder="exemplo@email.com" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-semibold">Senha</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" class="form-control form-control-lg" placeholder="Sua senha" required>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mt-2">
        Entrar
      </button>
      
      <div class="mt-4 text-center">
        <span class="text-muted">Ainda não tem conta?</span>
        <a routerLink="/register" class="text-primary fw-bold text-decoration-none ms-1">Cadastre-se</a>
      </div>
    </form>
  </div>
</div>
