<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg" style="width: 100%; max-width: 450px; border-radius: 15px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-success">Criar Conta</h2>
      <p class="text-muted">Preencha os dados para começar</p>
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome Completo</label>
        <input type="text" name="name" [(ngModel)]="userData.name" class="form-control" placeholder="Seu nome" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" [(ngModel)]="userData.email" class="form-control" placeholder="exemplo@email.com" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label fw-semibold">Senha</label>
        <input type="password" name="password" [(ngModel)]="userData.password" class="form-control" placeholder="Mínimo 6 caracteres" required>
      </div>
      
      <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm mt-2">
        Cadastrar
      </button>
      
      <div class="mt-4 text-center">
        <span class="text-muted">Já tem uma conta?</span>
        <a routerLink="/login" class="text-success fw-bold text-decoration-none ms-1">Faça Login</a>
      </div>
    </form>
  </div>
</div>
