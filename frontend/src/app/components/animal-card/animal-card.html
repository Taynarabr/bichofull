<div class="card text-center border-0 shadow-sm animal-card h-100" 
     [class.selected-card]="isSelected">
  <div class="card-body p-2 d-flex flex-column justify-content-center align-items-center">
    <div class="fs-1 mb-1">{{ animalData.icon }}</div>
    <small class="text-muted fw-bold d-block" style="font-size: 0.65rem;">
      {{ animalData.name | uppercase }}
    </small>
    <h4 class="fw-bold mb-0 mt-1">{{ animalData.group }}</h4>
  </div>
</div>
