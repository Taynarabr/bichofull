<div class="card h-100 border text-center shadow-sm" 
     [ngClass]="isSelected ? 'bg-success text-white border-success' : 'bg-white text-dark'"
     style="cursor: pointer; transition: 0.3s;">
  
  <div class="card-body d-flex flex-column align-items-center justify-content-center p-3">
    <h2 class="mb-2">{{ animalData?.icon }}</h2>
    
    <h6 class="card-title fw-bold mb-0">{{ animalData?.name }}</h6>
    
    <small [ngClass]="isSelected ? 'text-light' : 'text-muted'" style="font-size: 0.75rem;">
      Grupo {{ animalData?.group }}
    </small>
  </div>
</div>
