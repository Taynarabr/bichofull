name: CI BichoFull

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend CI (Build & Test)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build do Backend
      working-directory: ./backend
      run: mvn clean install -DskipTests

    - name: Executar Testes do Backend
      working-directory: ./backend
      run: mvn test

  frontend:
    name: Frontend CI (Build, Lint & Test)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Instalar Dependências
      working-directory: ./frontend
      run: npm install

    - name: Executar Linter
      working-directory: ./frontend
      run: npm run lint --if-present

    - name: Build do Frontend
      working-directory: ./frontend
      run: npm run build --if-present

    - name: Instalar Navegadores do Playwright
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium

    - name: Executar Testes do Frontend
      working-directory: ./frontend
      run: npm test -- --watch=false --browsers=chromium